services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: task_board
      POSTGRES_PASSWORD: password
      POSTGRES_DB: task_board_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    environment:
      DATABASE_HOST: db
      POSTGRES_USER: task_board
      POSTGRES_PASSWORD: password
      POSTGRES_DB: task_board_development
      RAILS_ENV: development
      RAILS_MASTER_KEY: development
    depends_on:
      - db
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: bash -lc "bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0"

  frontend:
    image: node:24-alpine
    working_dir: /app/frontend
    environment:
      CI: "true"
      VITE_API_PROXY_TARGET: http://backend:3000
    volumes:
      - .:/app
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

  e2e:
    image: mcr.microsoft.com/playwright:v1.56.1-noble
    working_dir: /app/frontend
    environment:
      CI: "true"
      PLAYWRIGHT_BASE_URL: http://frontend:5173
    volumes:
      - .:/app
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm e2e"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
